name: Deploy Static Pages to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Docs Repo
        uses: actions/checkout@v4

      - name: Initialize Automated Pages Setup
        uses: actions/configure-pages@v5

      - name: Compress Target Website Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './pages'

      - name: Deploy Live onto Github Pages
        id: deployment
        uses: actions/deploy-pages@v4